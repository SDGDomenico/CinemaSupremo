<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CinemaSupremo - Registrati</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <script defer src="js/menu.js"></script>
  <script defer src="js/footer.js"></script>
  <script type="module" src="js/auth.js"></script>
</head>
<body data-brand="home">

<header>
  <nav>
    <div class="logo"><a href="home">CinemaSupremo</a></div>
    <ul class="menu">
      <li><a href="home">Home</a></li>
      <li><a href="marvel">Marvel</a></li>
      <li><a href="dc">DC</a></li>
      <span id="authLinks"></span>
    </ul>
    <div class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </nav>
</header>

<main>
  <section class="hero">
    <h2>Crea il tuo account</h2>
    <p>Registrati per accedere a tutte le funzionalità di CinemaSupremo.</p>
  </section>

  <section class="form-container">
    <form id="registerForm">
      <h2>Registrati</h2>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Registrati</button>
      <p id="registerError" class="error-message"></p>
    </form>
  </section>
</main>

  <footer>
    <div class="footer-links">
      <a href="privacy">Privacy Policy</a>
      <a href="cookies">Cookie Policy</a>
      <a href="terms">Termini di Servizio</a>
    </div>
    <div class="footer-copy">
      <span>&copy; <span id="year"></span> CinemaSupremo &mdash; Tutti i diritti riservati</span>
    </div>
  </footer>

<script type="module" src="js/register.js"></script>
  <script defer src="js/cookies.js"></script>
</body>
</html>
